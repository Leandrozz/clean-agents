name: leandro-real-skill
version: 0.1.0
description: CLean-agents is a comprehensive Python framework and CLI tool designed to assist architects, engineers, and product leaders in designing, planning, and hardening production-grade agentic AI systems. This skill leverages a sophisticated multi-layer knowledge base to provide evidence-based recommendations across twelve critical dimensions including system purpose, scale, autonomy, domain expertise, memory architecture, tool integration, security posture, compliance requirements, and observability patterns. The framework combines heuristic analysis with optional Claude AI integration to produce architectural blueprints, risk assessments, and hardening strategies that directly improve reliability and safety.
artifact_type: skill
language: en
license: MIT
